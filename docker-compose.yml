services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
      POSTGRES_DB: helpdesk
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - data-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U helpdesk -d helpdesk" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks:
      - data-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    networks:
      - worker-messaging-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  auth-service:
    build: ./auth-service
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: helpdesk
    depends_on:
      - keycloak
    networks:
      - gateway-net
      - observability-net

  ticket-api:
    build: ./ticket-api
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
      POSTGRES_DB: helpdesk
      POSTGRES_HOST: db

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gateway-net
      - worker-messaging-net
      - data-net
      - observability-net

  frontend:
    build: ./frontend
    environment:
      AUTH_URL: http://kong:8000/auth
      API_URL: http://kong:8000
    depends_on:
      - keycloak
      - kong
    networks:
      - frontend-net
      - gateway-net

  worker:
    build: ./worker
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: user
      RABBITMQ_PASS: password
      BACKEND_URL: http://ticket-api:8000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - worker-messaging-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
    networks:
      - frontend-net
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/helpdesk-realm.json:/opt/keycloak/data/import/helpdesk-realm.json:ro

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8100:8000"
    depends_on:
      - ticket-api
      - auth-service
    networks:
      - gateway-net
      - observability-net
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:lts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - admin-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - observability-net
    depends_on:
      - ticket-api
      - auth-service
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - gateway-net
      - observability-net
    depends_on:
      - prometheus
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@helpdesk.com
      PGADMIN_DEFAULT_PASSWORD: admin
      SCRIPT_NAME: /pgadmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - data-net
      - gateway-net
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  keycloak_data:
  pgadmin_data:
  portainer_data:
  prometheus_data:
  grafana_data:

networks:
  frontend-net:
    driver: bridge
  gateway-net:
    driver: bridge
  worker-messaging-net:
    driver: bridge
  data-net:
    driver: bridge
  observability-net:
    driver: bridge
  admin-net:
    driver: bridge
