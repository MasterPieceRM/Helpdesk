name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: masterpiecerm/helpdesk

jobs:
  # ── Stage 1: Test ───────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Backend Tests
        working-directory: backend
        run: |
          pip install -r requirements.txt -q
          pip install -r requirements-test.txt -q
          python -m pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Run Worker Tests
        working-directory: worker
        run: |
          pip install -r requirements.txt -q
          pip install -r requirements-test.txt -q
          python -m pytest tests/ -v --cov=. --cov-report=term-missing

  # ── Stage 2: Build & Push Images ────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - ticket-api
          - auth-service
          - frontend
          - worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

  # ── Stage 3: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin
            git reset --hard origin/main
            STACK_CONFIG_VERSION=$(git rev-parse --short HEAD)
            docker inspect swarm-manager >/dev/null 2>&1 || { echo 'swarm-manager container not found'; exit 1; }
            docker exec swarm-manager docker info >/dev/null 2>&1 || { echo 'inner Docker daemon in swarm-manager is not ready'; exit 1; }
            docker exec swarm-manager mkdir -p /workspace/Helpdesk
            docker exec swarm-manager sh -lc 'rm -rf /workspace/Helpdesk/* /workspace/Helpdesk/.[!.]* /workspace/Helpdesk/..?* 2>/dev/null || true'
            docker cp "$PWD"/. swarm-manager:/workspace/Helpdesk
            docker exec -e STACK_CONFIG_VERSION="$STACK_CONFIG_VERSION" swarm-manager sh -lc '
              set -e
              cd /workspace/Helpdesk
              docker stack deploy --prune -c docker-stack.yml helpdesk
              current_configs=$(docker service ls --filter label=com.docker.stack.namespace=helpdesk -q | xargs -r docker service inspect --format "{{range .Spec.TaskTemplate.ContainerSpec.Configs}}{{println .ConfigName}}{{end}}" | sort -u)
              for cfg in $(docker config ls --format "{{.Name}}" | grep "^helpdesk_" || true); do
                if ! printf "%s\n" "$current_configs" | grep -qx "$cfg"; then
                  docker config rm "$cfg" >/dev/null 2>&1 || true
                fi
              done
              docker service ls
            '
            echo "Deployed successfully at $(date)"
