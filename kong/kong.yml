_format_version: "3.0"
_transform: true

services:
  - name: frontend
    url: http://frontend:8501
    routes:
      - name: frontend-route
        paths:
          - /
        strip_path: false

  # ── Ticket API ──────────────────────────────────────────────
  - name: ticket-api
    url: http://ticket-api:8000
    routes:
      - name: tickets-route
        paths:
          - /tickets
        strip_path: false

      - name: notifications-route
        paths:
          - /notifications
        strip_path: false

      - name: ticket-api-proxy
        paths:
          - /ticket-api
        strip_path: true

  # ── Auth Service ────────────────────────────────────────────
  - name: auth-service
    url: http://auth-service:8001
    routes:
      - name: auth-route
        paths:
          - /auth
        strip_path: true

  - name: pgadmin
    url: http://pgadmin:80
    routes:
      - name: pgadmin-route
        paths:
          - /pgadmin
        strip_path: false

plugins:
  # ── Global Rate Limiting ────────────────────────────────────
  - name: rate-limiting
    config:
      minute: 100
      policy: local

  - name: prometheus

  # ── Global Request Logging ──────────────────────────────────
  - name: file-log
    config:
      path: /dev/stdout
      reopen: false
